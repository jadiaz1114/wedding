# Nginx site config for the wedding invitation site.
#
# Install at /etc/nginx/sites-available/wedding, symlink into
# sites-enabled, then run `sudo certbot --nginx` to fill in the TLS
# lines automatically (see README.md for the full walkthrough).
#
# Replace every occurrence of YOUR_DOMAIN below with your real domain
# (e.g. joseandmichelle.com) before enabling this file.

# Rate-limit API traffic per client IP, independent of the app's own
# in-process rate limiting — a second layer that keeps abusive
# traffic from ever reaching Node.
limit_req_zone $binary_remote_addr zone=wedding_api:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let certbot answer ACME HTTP-01 challenges here; everything else
    # on plain HTTP is sent to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/wedding;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # certbot --nginx fills these in automatically; left here as
    # placeholders so the file is self-documenting.
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/wedding;
    index index.html;

    client_max_body_size 1m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; frame-src https://www.youtube.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---- Static site ----
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|mp3)$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # Never serve dotfiles (.env, .git, etc.) even if one ends up in the webroot.
    location ~ /\. {
        deny all;
    }

    # ---- API reverse proxy ----
    location /api/ {
        limit_req zone=wedding_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
