# Nginx site config for the wedding invitation site.
#
# Install at /etc/nginx/sites-available/wedding, symlink into
# sites-enabled (see README.md for the full walkthrough). Works as-is
# over plain HTTP — by the VM's IP address, no domain or certificate
# needed yet.
#
# Once you have a domain pointed at this server, edit server_name below
# to match it, reload Nginx, then run:
#   sudo certbot --nginx --hsts -d yourdomain.com -d www.yourdomain.com
# Certbot edits this file in place to add the HTTPS block, certificate
# paths, and an HTTP->HTTPS redirect — see README.md step 9.

# Rate-limit API traffic per client IP, independent of the app's own
# in-process rate limiting — a second layer that keeps abusive
# traffic from ever reaching Node.
limit_req_zone $binary_remote_addr zone=wedding_api:10m rate=5r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Catch-all: matches requests by IP address. Once you have a domain,
    # replace this with:  server_name yourdomain.com www.yourdomain.com;
    server_name _;

    root /var/www/wedding;
    index index.html;

    client_max_body_size 1m;

    # ---- Security headers ----
    # (Strict-Transport-Security is intentionally omitted here — it only
    # makes sense once HTTPS is live, and `certbot --hsts` adds it for
    # you automatically when you enable TLS in step 9.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; frame-src https://www.youtube.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---- Static site ----
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|mp3)$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # Never serve dotfiles (.env, .git, etc.) even if one ends up in the webroot.
    location ~ /\. {
        deny all;
    }

    # ---- API reverse proxy ----
    # ^~ stops Nginx from falling through to the \.(css|js|...)$ regex
    # location above for paths like /admin/app.js — without it, that
    # regex would win (regex locations beat plain prefix locations) and
    # Nginx would try to serve it as a static file from the webroot,
    # 404ing instead of reaching Node.
    location ^~ /api/ {
        limit_req zone=wedding_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Admin dashboard (served by Node, not the static webroot) ----
    # Not linked from the public site; the page itself holds no guest
    # data and only renders what /api/admin/* returns after the visitor
    # supplies the ADMIN_TOKEN from server/.env — see README.md.
    location ^~ /admin {
        limit_req zone=wedding_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Guest list (Name/table/QR code, same ADMIN_TOKEN gate as /admin) ----
    location ^~ /guestlist {
        limit_req zone=wedding_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Public per-guest "welcome" page a QR code links to ----
    # No auth — anyone with the (unguessable) link/QR can view it, same
    # trust model as a printed place card.
    location ^~ /table/ {
        limit_req zone=wedding_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
